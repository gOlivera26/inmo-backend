name: .NET 8 Web API CI/CD - InmoBackend

on:
  push:
    branches: [ "master", "main", "Development" ]
  pull_request:
    branches: [ "master", "main", "Development" ]


jobs:
  build-and-test:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout code
      uses: actions/checkout@v4


    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x


    - name: Restore dependencies
      run: dotnet restore Inmo24.slnx


    - name: Build
      run: dotnet build Inmo24.slnx --configuration Release --no-restore


    - name: Test with Coverage
      run: dotnet test Inmo24.slnx --configuration Release --no-build --collect:"XPlat Code Coverage" --logger "console;verbosity=normal"


    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-results
        path: '**/coverage.results/**'
        retention-days: 7


    - name: Publish
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      run: dotnet publish Inmo24.API/Inmo24.API.csproj -c Release -o ./publish


    - name: Upload Build Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: InmoBackendAPI-Release
        path: ./publish
        retention-days: 5
